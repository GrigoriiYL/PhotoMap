{%extends "base.html"%}

{%block content%}
<div class="search_btn_div">
    <a class="btn" href="/search">Поиск</a>
</div>
{% for chat in chats %}
<div class="col-md6 border rounded">
    <img src="{{chat[1].profile_photo_link}}" height='100px' width='100px' alt="Нет аватарки">
    <h2>{{chat[1].name}}</h2>
    <div class="btn_write">
        <a class="btn" href="/open_chat/{{chat[0].id}}">Написать</a>
    </div>
</div>
{%endfor%}
{%endblock%}
