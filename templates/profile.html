{%extends "base.html"%}

{% block content %}
<div class="col-md6 border rounde">
    <div class="post_img_center">
        <img src="{{current_user.profile_photo_link}}" width="50%" height="50%">
    </div>
    <div class="post_img_center">
        <h1>{{current_user.name}}</h1>
    </div>
    <div class="post_img_center">
        <p>{{current_user.about}}</p>
    </div>
    <div class="post_img_center">
        <a href="change_user/{{current_user.id}}" class="btn">Изменить профиль</a>
    </div>
</div>
<div>
    <div class="post_img_center">
        <a class="btn" href="/create_post">Создать пост</a>
    </div>
    <div class="post_img_center">
        <a class="btn" href="/create_bot">Создать бота</a>
    </div>
</div>
{% for post in posts %}
<div class="col-md6 border rounded">
    <div class="post_img_center">
        <img src="{{post.img_link}}" height='48.75%' width="65%">
    </div>
    <div class="post_img_center">
        <a class="btn" href="/open_post/{{post.id}}">Комментарии</a>
    </div>
</div>

{%endfor%}

{%endblock%}
