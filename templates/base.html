<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@forevolve/bootstrap-dark@4.0.2/dist/css/bootstrap-dark.min.css">
    <link rel="stylesheet" href="static/css/btn_style.css">
</head>
<body>
{% if current_user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <a class="btn" href="/">Главная</a>
    <a class="btn" href="/all_chats">Чаты</a>
    <a class="btn" href="/profile">Профиль</a>
</nav>
{%else%}

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <a class="btn" href="/registration">Зарегистрироваться</a>
    <a class="btn" href="login">Войти</a></nav>
{%endif%}
<main role="main" class="container">
    <br><br><br>
    {% block content %}{%endblock%}
</main>
</body>
</html>
